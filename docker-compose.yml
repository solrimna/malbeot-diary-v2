services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    # 소스 코드를 컨테이너에 마운트 → 파일 변경 시 재빌드 없이 반영
    volumes:
      - .:/app
    # --reload: 파일 변경 감지 시 uvicorn 자동 재시작 (로컬 개발 전용)
    # 프로덕션 배포 시에는 Dockerfile CMD 그대로 사용 (--reload 제거)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: malbeot
      POSTGRES_PASSWORD: malbeot
      POSTGRES_DB: malbeot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
