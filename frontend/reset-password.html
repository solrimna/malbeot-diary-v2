<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - 하루.commit()</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Petit+Formal+Script&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050814;
        }

        #tsparticles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        .above-bg {
            position: relative;
            z-index: 10;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        .divider { background-color: rgba(255, 255, 255, 0.3); }
        .heading { color: #ffffff; }
        .label { color: rgba(255, 255, 255, 0.55); }

        .field-input {
            background-color: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.25);
            color: #ffffff;
            transition: border-color 0.25s ease;
        }

        .field-input::placeholder { color: rgba(255, 255, 255, 0.25); }
        .field-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.7);
            background-color: transparent;
        }

        .field-input:-webkit-autofill,
        .field-input:-webkit-autofill:hover,
        .field-input:-webkit-autofill:focus {
            -webkit-text-fill-color: #ffffff;
            -webkit-box-shadow: 0 0 0 1000px transparent inset;
            transition: background-color 9999s ease-out 0s;
            caret-color: #ffffff;
        }

        .submit-btn {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.28);
            backdrop-filter: blur(8px);
            transition: all 0.25s ease;
        }

        .submit-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .small-text { color: rgba(255, 255, 255, 0.45); }
        .toggle-btn { color: rgba(255, 255, 255, 0.85); }

        #reset-message { color: rgba(255, 255, 255, 0.8); }
        #pw-match-msg { color: rgba(255, 255, 255, 0.7); }

        /* 유효하지 않은 토큰 오류 배너 */
        #invalid-banner {
            background: rgba(255, 77, 77, 0.15);
            border: 1px solid rgba(255, 77, 77, 0.4);
            color: #ff9999;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative font-kr">

    <div id="tsparticles"></div>

    <a href="login.html" class="above-bg absolute top-8 left-8 text-white/70 flex items-center gap-2 hover:text-white transition-colors z-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        <span class="tracking-widest text-sm uppercase">Back to Login</span>
    </a>

    <div class="above-bg card w-[90vw] max-w-md p-10 sm:p-12 rounded-sm animate-fade">
        <div class="text-center mb-10">
            <h2 class="heading font-script text-4xl mb-2">Reset</h2>
            <div class="divider w-12 h-[1px] mx-auto opacity-50"></div>
        </div>

        <div id="invalid-banner" class="hidden rounded-sm px-4 py-3 text-sm text-center mb-6"></div>

        <div id="reset-form-wrap">
            <h3 class="heading text-xl font-medium mb-2 text-center tracking-tight">새 비밀번호 설정</h3>
            <p class="small-text text-xs text-center mb-8">8자 이상의 새 비밀번호를 입력해주세요.</p>
            <form id="reset-form-element" class="space-y-6">
                <div>
                    <label for="new-password" class="label block text-xs uppercase tracking-widest mb-2">New Password</label>
                    <input
                        id="new-password"
                        name="new_password"
                        type="password"
                        required
                        minlength="8"
                        class="field-input w-full py-2 px-1 text-sm"
                        placeholder="새 비밀번호 (8자 이상)"
                    >
                </div>
                <div>
                    <label for="new-password-confirm" class="label block text-xs uppercase tracking-widest mb-2">Confirm Password</label>
                    <input
                        id="new-password-confirm"
                        name="new_password_confirm"
                        type="password"
                        required
                        minlength="8"
                        class="field-input w-full py-2 px-1 text-sm"
                        placeholder="비밀번호 확인"
                    >
                    <p id="pw-match-msg" class="mt-2 text-xs hidden"></p>
                </div>
                <button id="reset-submit" type="submit" class="submit-btn w-full py-4 mt-4 text-sm tracking-[0.2em] uppercase font-medium rounded-sm">
                    Change Password
                </button>
                <p id="reset-message" class="hidden text-sm text-center mt-4"></p>
            </form>
        </div>
    </div>

    <script src="js/base.js"></script>
    <script src="js/auth.js"></script>
    <script>
        (function initResetPage() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get("token");

            const invalidBanner = document.getElementById("invalid-banner");
            const formWrap = document.getElementById("reset-form-wrap");

            if (!token) {
                invalidBanner.textContent = "유효하지 않은 링크입니다. 비밀번호 찾기를 다시 시도해주세요.";
                invalidBanner.classList.remove("hidden");
                formWrap.classList.add("hidden");
                return;
            }

            const pwInput = document.getElementById("new-password");
            const pwConfirmInput = document.getElementById("new-password-confirm");
            const matchMsg = document.getElementById("pw-match-msg");

            function checkMatch() {
                const pw = pwInput.value;
                const confirm = pwConfirmInput.value;
                if (!confirm) { matchMsg.classList.add("hidden"); return; }
                if (pw === confirm) {
                    matchMsg.textContent = "Passwords match.";
                    matchMsg.style.color = "#6B8F5E";
                    pwConfirmInput.style.borderColor = "#6B8F5E";
                } else {
                    matchMsg.textContent = "Passwords do not match.";
                    matchMsg.style.color = "#ff4d4d";
                    pwConfirmInput.style.borderColor = "#ff4d4d";
                }
                matchMsg.classList.remove("hidden");
            }

            pwInput.addEventListener("input", checkMatch);
            pwConfirmInput.addEventListener("input", checkMatch);

            document.getElementById("reset-form-element").addEventListener("submit", async (event) => {
                event.preventDefault();

                const message = document.getElementById("reset-message");
                const submitBtn = document.getElementById("reset-submit");
                const newPassword = pwInput.value;
                const confirm = pwConfirmInput.value;

                message.classList.add("hidden");

                if (newPassword !== confirm) {
                    message.textContent = "비밀번호가 일치하지 않습니다.";
                    message.style.color = "#ff4d4d";
                    message.classList.remove("hidden");
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = "Changing...";
                submitBtn.style.opacity = "0.7";

                try {
                    await apiRequest("/auth/reset-password", {
                        method: "POST",
                        body: JSON.stringify({ token, new_password: newPassword }),
                    });
                    message.textContent = "비밀번호가 변경되었습니다. 로그인 페이지로 이동합니다.";
                    message.style.color = "#6B8F5E";
                    message.classList.remove("hidden");
                    document.getElementById("reset-form-element").reset();
                    setTimeout(() => { window.location.href = "login.html"; }, 2000);
                } catch (error) {
                    message.textContent = error.message || "링크가 만료되었거나 유효하지 않습니다.";
                    message.style.color = "#ff4d4d";
                    message.classList.remove("hidden");
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Change Password";
                    submitBtn.style.opacity = "";
                }
            });
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    <script src="js/particles.js"></script>
</body>
</html>
