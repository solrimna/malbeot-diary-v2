<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 일기장 - "하루" commit()</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Petit+Formal+Script&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        #us-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        /* 콘텐츠 레이어 */
        .diary-layer {
            position: relative;
            z-index: 10;
        }

    </style>
</head>
<body class="page-diary min-h-screen relative font-kr">

    <div id="us-background" data-us-project="ZnNikMOUWaAR1UzFsvqp"></div>
    <app-nav></app-nav>


    <main class="diary-layer min-h-screen px-6 py-24 md:px-10 lg:px-16 overflow-hidden">
        <div class="max-w-7xl mx-auto">

            <div class="text-left mb-10">
                <p class="font-script text-lg md:text-xl text-white/60 mb-2">My diary bookshelf</p>
                <h2 class="text-xl md:text-2xl tracking-tight text-white font-semibold mb-3">
                    나의 일기 책장
                </h2>
                <div class="w-16 h-[1px] bg-white/25 mb-4"></div>

                <p class="text-white/70 text-sm md:text-base max-w-2xl leading-relaxed">
                    하루를 기록하면 한 권의 책처럼 쌓이고, 흐릿한 기억은 AI 검색으로 다시 찾아볼 수 있어요.
                </p>
            </div>

            <section class="diary-hero-stage">
                <div class="diary-progress-wrap">
                    <div id="diary-progress" class="diary-progress"></div>
                </div>

                <div class="flex items-center justify-between mb-6">
                    <div class="flex gap-3">
                        <button type="button" class="diary-nav-btn" onclick="moveDiaryShelf(-1)">‹</button>
                        <button type="button" class="diary-nav-btn" onclick="moveDiaryShelf(1)">›</button>
                    </div>
                </div>
                <!-- 해시태그 필터 표시 영역 -->
                <div id="tag-filter-banner" class="hidden mb-4 flex items-center gap-3">
                    <span class="text-white/70 text-sm">태그 필터:</span>
                    <span id="tag-filter-label" class="px-3 py-1 rounded-full text-sm text-white border border-white/40 bg-white/10"></span>
                    <button type="button" onclick="clearTagFilter()" class="text-white/50 hover:text-white text-sm underline">전체 보기</button>
                </div>
                <div class="diary-shelf-wrapper">
                    <div class="diary-floor-line"></div>

                    <div id="diary-shelf" class="diary-shelf-track">
                        <div class="diary-empty-book" id="diary-empty-state">
                            아직 저장된 일기가 없어요.<br>
                            첫 번째 하루를 책으로 만들어보세요.
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="js/nav.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/search.js"></script>
    <script src="js/stt.js"></script>
    <script src="js/frontend.js"></script>
    <script src="js/diary.js"></script>
</body>
</html>
