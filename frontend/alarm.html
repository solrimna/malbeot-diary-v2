<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>알람 설정</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="page-container">
    <section class="card">
      <h1>알람 설정</h1>
      <p>시간과 요일을 선택해 알람을 등록하세요.</p>

      <form id="alarm-form">
        <div class="form-group">
          <label for="alarm-time">알람 시간</label>
          <input type="time" id="alarm-time" required />
        </div>

        <div class="form-group">
          <label>반복 요일</label>
          <div class="weekday-group">
            <label><input type="checkbox" value="MON" /> 월</label>
            <label><input type="checkbox" value="TUE" /> 화</label>
            <label><input type="checkbox" value="WED" /> 수</label>
            <label><input type="checkbox" value="THU" /> 목</label>
            <label><input type="checkbox" value="FRI" /> 금</label>
            <label><input type="checkbox" value="SAT" /> 토</label>
            <label><input type="checkbox" value="SUN" /> 일</label>
          </div>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" id="alarm-enabled" checked />
            알람 활성화
          </label>
        </div>

        <button type="submit">알람 저장</button>
      </form>

      <hr />

      <section>
        <h2>등록된 알람</h2>
        <button type="button" id="load-alarms-btn">알람 불러오기</button>
        <ul id="alarm-list"></ul>
      </section>
    </section>
  </main>

  <script src="/js/frontend.js"></script>
  <script>
    const alarmForm = document.getElementById("alarm-form");
    const alarmList = document.getElementById("alarm-list");
    const loadAlarmsBtn = document.getElementById("load-alarms-btn");

    function getToken() {
      return localStorage.getItem("access_token");
    }

    function getCheckedDays() {
      return Array.from(
        document.querySelectorAll('.weekday-group input[type="checkbox"]:checked')
      ).map((el) => el.value);
    }

    async function loadAlarms() {
      const token = getToken();
      if (!token) {
        alert("먼저 로그인해 주세요.");
        return;
      }

      try {
        const response = await fetch("/api/v1/alarms/alarms/", {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Accept": "application/json"
          }
        });

        if (!response.ok) {
          throw new Error("알람 목록 조회 실패");
        }

        const data = await response.json();
        alarmList.innerHTML = "";

        if (!Array.isArray(data) || data.length === 0) {
          alarmList.innerHTML = "<li>등록된 알람이 없습니다.</li>";
          return;
        }

        data.forEach((alarm) => {
          const li = document.createElement("li");
          li.textContent = `시간: ${alarm.alarm_time} / 요일: ${alarm.repeat_days ?? "-"} / 활성화: ${alarm.is_enabled ? "ON" : "OFF"}`;
          alarmList.appendChild(li);
        });
      } catch (error) {
        console.error(error);
        alert("알람 목록을 불러오지 못했습니다.");
      }
    }

    alarmForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const token = getToken();
      if (!token) {
        alert("먼저 로그인해 주세요.");
        return;
      }

      const alarmTime = document.getElementById("alarm-time").value;
      const isEnabled = document.getElementById("alarm-enabled").checked;
      const repeatDays = getCheckedDays();

      if (!alarmTime) {
        alert("알람 시간을 선택해 주세요.");
        return;
      }

      const payload = {
        alarm_time: `${alarmTime}:00`,
        repeat_days: repeatDays,
        is_enabled: isEnabled
      };

      try {
        const response = await fetch("/api/v1/alarms/alarms/", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(errorText || "알람 생성 실패");
        }

        alert("알람이 저장되었습니다.");
        alarmForm.reset();
        document.getElementById("alarm-enabled").checked = true;
        loadAlarms();
      } catch (error) {
        console.error(error);
        alert("알람 저장에 실패했습니다.");
      }
    });

    loadAlarmsBtn.addEventListener("click", loadAlarms);

    window.addEventListener("DOMContentLoaded", () => {
      loadAlarms();
    });
  </script>
</body>
</html>
