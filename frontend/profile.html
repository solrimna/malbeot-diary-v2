<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 현황 - "하루" commit()</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Petit+Formal+Script&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        #tsparticles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        body.page-profile {
            background: transparent !important;
        }

        /* 콘텐츠 레이어 */
        .profile-layer {
            position: relative;
            z-index: 10;
        }

        /* 헤더 텍스트 흰색 */
        .profile-hero-title {
            color: #ffffff;
        }

        /* 달력 select option */
        .profile-calendar-select option {
            background-color: #1a0e14;
            color: #ffffff;
        }

        .alarm-time-selects {
            display: flex;
            gap: 8px;
            align-items: center;
        }
    </style>
</head>
<body class="page-profile min-h-screen font-kr relative">

    <!-- 공통 배경 -->
    <div id="tsparticles"></div>
    <app-nav></app-nav>


    <main class="profile-layer min-h-screen px-6 py-16 md:px-10 lg:px-16">
        <div class="profile-shell">

            <!-- 헤더 -->
            <div class="text-left mb-10">
                <p class="font-script text-lg md:text-xl text-white/60 mb-2">My status</p>
                <h2 class="text-xl md:text-2xl tracking-tight text-white font-semibold mb-3">나의 현황</h2>
                <div class="w-16 h-[1px] bg-white/25 mb-4"></div>
                <p class="text-white/70 text-sm md:text-base max-w-2xl leading-relaxed">일기를 쓴 날을 달력으로 확인할 수 있어요.</p>
            </div>

            <!-- 사이드바 + 메인 콘텐츠 래퍼 -->
            <div class="profile-body-layout">

                <!-- ─── 왼쪽 사이드바 ─── -->
                <aside class="profile-sidebar-card">

                    <!-- 아바타 + 닉네임 -->
                    <div class="profile-sid-identity">
                        <div class="profile-sid-nickname-wrap">
                            <p class="profile-sid-nickname-label">닉네임</p>
                            <p class="profile-sid-nickname" id="profile-nickname">—</p>
                        </div>
                    </div>

                    <div class="profile-sid-divider"></div>

                    <!-- 이번달 출석 통계 -->
                    <div class="profile-sid-stats">
                        <p class="profile-sid-stats-label">이번달 출석 일수</p>
                        <p class="profile-sid-stats-message" id="profile-attendance-message">집계 중…</p>
                    </div>

                </aside>

                <!-- ─── 오른쪽 메인 콘텐츠 ─── -->
                <div class="profile-main-content">
                    <section class="profile-tabs-card">
                        <section class="profile-calendar-card">
                            <div class="profile-calendar-header">
                                <div>
                                    <p class="profile-calendar-caption">Diary calendar</p>
                                    <div class="profile-calendar-selects">
                                        <select id="profile-calendar-year"  class="profile-calendar-select"></select>
                                        <select id="profile-calendar-month" class="profile-calendar-select"></select>
                                    </div>
                                </div>
                            </div>

                            <div class="profile-calendar-weekdays">
                                <span>일</span><span>월</span><span>화</span>
                                <span>수</span><span>목</span><span>금</span><span>토</span>
                            </div>

                            <div id="profile-calendar-grid" class="profile-calendar-grid"></div>

                            <div class="profile-calendar-legend">
                                <span class="profile-legend-dot"></span>
                                <span>일기 작성 완료</span>
                            </div>
                        </section>
                    </section>
                </div>

            </div>
        </div>
    </main>

    <script src="js/nav.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/search.js"></script>
    <script src="js/stt.js"></script>
    <script src="js/frontend.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    <script src="js/particles.js"></script>
</body>
</html>
