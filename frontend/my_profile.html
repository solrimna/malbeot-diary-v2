<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 프로필 - "하루" commit()</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Petit+Formal+Script&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        #us-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        .myprofile-layer {
            position: relative;
            z-index: 10;
        }

        .myprofile-nav {
            background: rgba(5, 8, 20, 0.05) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(180, 200, 255, 0.08) !important;
        }

        /* 카드 공통 */
        .mp-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 32px;
            padding: 36px 40px;
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.22);
        }

        /* 아바타 */
        .mp-avatar {
            width: 88px;
            height: 88px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            border: 2px solid rgba(255, 255, 255, 0.22);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            color: rgba(255, 255, 255, 0.6);
            flex-shrink: 0;
        }

        /* 인풋 */
        .mp-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            color: #ffffff;
            padding: 14px 18px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .mp-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .mp-input:focus {
            border-color: rgba(255, 255, 255, 0.5);
        }

        .mp-input:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        /* 라벨 */
        .mp-label {
            display: block;
            font-size: 12px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
        }

        /* 버튼 */
        .mp-btn {
            border: 1px solid rgba(255, 255, 255, 0.28);
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-radius: 999px;
            padding: 13px 28px;
            font-size: 13px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, opacity 0.2s;
        }

        .mp-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.45);
        }

        .mp-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .mp-btn-danger {
            border-color: rgba(255, 80, 80, 0.35);
            background: rgba(255, 50, 50, 0.08);
            color: rgba(255, 160, 160, 0.9);
        }

        .mp-btn-danger:hover {
            border-color: rgba(255, 80, 80, 0.65);
            background: rgba(255, 50, 50, 0.2);
            color: #ffffff;
        }

        /* 구분선 */
        .mp-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 28px 0;
        }

        /* 메시지 */
        .mp-msg {
            font-size: 13px;
            margin-top: 10px;
            min-height: 18px;
        }

        /* 탈퇴 확인 박스 */
        #delete-confirm-box {
            background: rgba(255, 40, 40, 0.07);
            border: 1px solid rgba(255, 80, 80, 0.22);
            border-radius: 18px;
            padding: 20px 24px;
        }
    </style>
</head>
<body class="page-profile min-h-screen relative font-kr">

    <div id="us-background" data-us-project="ZnNikMOUWaAR1UzFsvqp"></div>

    <!-- 네비게이션 (hover 드롭다운) -->
    <div class="myprofile-layer absolute top-0 left-0 w-full h-16 z-30 peer"></div>

    <nav class="myprofile-nav myprofile-layer absolute top-0 left-0 w-full text-[#c8d8f8] shadow-2xl z-40 transform -translate-y-full transition-transform duration-500 ease-in-out peer-hover:translate-y-0 hover:translate-y-0">
        <div class="w-full max-w-7xl mx-auto flex justify-between items-center px-8 md:px-16 py-6 font-kr">
            <a href="diary_write.html" class="text-sm md:text-lg font-light tracking-widest hover:text-white transition-colors duration-300">일기 작성하기</a>
            <a href="my-diary.html"    class="text-sm md:text-lg font-light tracking-widest hover:text-white transition-colors duration-300">나의 일기장</a>
            <a href="profile.html"     class="text-sm md:text-lg font-light tracking-widest hover:text-white transition-colors duration-300">나의 현황</a>
        </div>
    </nav>

    <main class="myprofile-layer min-h-screen px-6 py-24 md:px-10 lg:px-16">
        <div class="max-w-3xl mx-auto">

            <!-- 헤더 -->
            <div class="text-center mb-14">
                <p class="font-script text-2xl md:text-3xl text-white/70 mb-4">My Profile</p>
                <h1 class="text-3xl md:text-5xl tracking-tight text-white font-semibold mb-4">내 프로필</h1>
                <div class="w-24 h-[1px] mx-auto bg-white/30"></div>
            </div>

            <!-- 프로필 요약 카드 -->
            <div class="mp-card mb-6">
                <div class="flex items-center gap-6">
                    <div class="mp-avatar" id="profile-avatar">👤</div>
                    <div class="flex-1 min-w-0">
                        <p class="mp-label mb-1">닉네임</p>
                        <p id="display-nickname" class="text-white text-2xl font-semibold truncate">—</p>
                        <p id="display-username" class="text-white/50 text-sm mt-1 tracking-wider">—</p>
                    </div>
                    <div class="text-right flex-shrink-0 hidden sm:block">
                        <p class="mp-label mb-1">가입일</p>
                        <p id="display-created-at" class="text-white/70 text-sm">—</p>
                        <p class="mp-label mt-3 mb-1">마지막 로그인</p>
                        <p id="display-last-login" class="text-white/70 text-sm">—</p>
                    </div>
                </div>
            </div>

            <!-- 프로필 수정 카드 -->
            <div class="mp-card mb-6">
                <p class="font-script text-xl text-white/70 mb-1">Edit profile</p>
                <h2 class="text-xl font-semibold text-white mb-8">프로필 수정</h2>

                <!-- 닉네임 변경 -->
                <div class="mb-6">
                    <label class="mp-label" for="edit-nickname">닉네임</label>
                    <input id="edit-nickname" type="text" class="mp-input" placeholder="새 닉네임 입력" maxlength="50">
                </div>

                <div class="mp-divider"></div>

                <!-- 비밀번호 변경 -->
                <p class="text-white/60 text-sm mb-5">비밀번호를 변경하려면 아래를 입력하세요. 변경하지 않을 경우 비워두세요.</p>
                <div class="mb-4">
                    <label class="mp-label" for="edit-password">새 비밀번호</label>
                    <input id="edit-password" type="password" class="mp-input" placeholder="8자 이상" autocomplete="new-password">
                </div>
                <div class="mb-6">
                    <label class="mp-label" for="edit-password-confirm">새 비밀번호 확인</label>
                    <input id="edit-password-confirm" type="password" class="mp-input" placeholder="동일하게 입력" autocomplete="new-password">
                </div>

                <div class="flex items-center gap-4">
                    <button type="button" id="save-profile-btn" class="mp-btn" onclick="saveProfile()">저장하기</button>
                    <p id="save-msg" class="mp-msg hidden"></p>
                </div>
            </div>

            <!-- 로그아웃 + 탈퇴 카드 -->
            <div class="mp-card">
                <p class="font-script text-xl text-white/70 mb-1">Account</p>
                <h2 class="text-xl font-semibold text-white mb-8">계정 관리</h2>

                <div class="flex flex-wrap gap-3 mb-8">
                    <button type="button" class="mp-btn" id="profile-logout-button">로그아웃</button>
                </div>

                <div class="mp-divider"></div>

                <!-- 탈퇴 영역 -->
                <div>
                    <p class="text-white/50 text-sm mb-4">계정을 탈퇴하면 모든 일기와 데이터가 <strong class="text-white/70">영구 삭제</strong>되며 복구할 수 없습니다.</p>
                    <button type="button" class="mp-btn mp-btn-danger" onclick="toggleDeleteConfirm(true)">회원 탈퇴</button>
                </div>

                <!-- 탈퇴 확인 박스 (기본 숨김) -->
                <div id="delete-confirm-box" class="mt-6 hidden">
                    <p class="text-red-300 text-sm font-medium mb-4">정말로 탈퇴하시겠습니까? 이 작업은 되돌릴 수 없습니다.</p>
                    <div class="flex gap-3 items-center">
                        <button type="button" class="mp-btn mp-btn-danger" id="confirm-delete-btn" onclick="deleteAccount()">네, 탈퇴합니다</button>
                        <button type="button" class="mp-btn" onclick="toggleDeleteConfirm(false)">취소</button>
                        <p id="delete-msg" class="mp-msg hidden"></p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/frontend.js"></script>
    <script src="js/my_profile.js"></script>
</body>
</html>
