name: CI/CD

# 외부 액션 버전 고정 정책
# - @vN 같은 플로팅 태그는 메이저 버전 내 최신 릴리즈로 자동 갱신된다.
#   해당 릴리즈에 버그·CDN 장애가 있으면 코드 변경 없이 CI가 갑자기 깨진다.
# - 모든 외부 액션은 패치 버전까지 고정(예: @v0.1.7)한다.
#   업그레이드가 필요할 때는 의도적으로 버전을 올린다.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # PR 및 모든 푸시: SQLite로 빠르게 테스트
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.1         # 플로팅 @v5 대신 고정

      - uses: actions/setup-python@v6.2.0     # 플로팅 @v6 대신 고정
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system pytest==8.3.4 pytest-asyncio==0.24.0

      - name: Run tests (SQLite)
        run: pytest

  # main 브랜치 푸시: 배포 전 PostgreSQL로 검증
  test-postgres:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_malbeot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5.0.1         # 플로팅 @v5 대신 고정

      - uses: actions/setup-python@v6.2.0     # 플로팅 @v6 대신 고정
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system pytest==8.3.4 pytest-asyncio==0.24.0 asyncpg==0.30.0

      - name: Run tests (PostgreSQL)
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_malbeot
        run: pytest

  deploy:
    needs: [test, test-postgres]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5.0.1         # 플로팅 @v5 대신 고정

      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/malbeot-diary:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/malbeot-diary:latest

      - name: Copy configs to EC2
        uses: appleboy/scp-action@v0.1.7      # 고정 버전 유지
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx/"
          target: "~/app"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7      # @v1 플로팅에서 고정으로 변경 (v1.8.2 drone-ssh 다운로드 장애 대응)
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/malbeot-diary:latest docker compose -f docker-compose.yml pull app
            # DB · Redis 먼저 기동
            DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/malbeot-diary:latest docker compose -f docker-compose.yml up -d db redis
            # 마이그레이션 완료 후 컨테이너 자동 제거
            DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/malbeot-diary:latest docker compose -f docker-compose.yml run --rm app alembic upgrade head
            # 마이그레이션 완료 후 앱 기동
            DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/malbeot-diary:latest docker compose -f docker-compose.yml up -d
            docker image prune -f
